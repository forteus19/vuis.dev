<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<title>Player Status</title>
	</head>
	<body>
		<div class="top-nav">
			<a href="index.html">Home</a>
			<a id="player-link" hidden>Player</a>
			<a id="inventory-link" hidden>Armory</a>
		</div>

		<h2 id="title" class="flex-text"></h2>

		<p id="loading-text">Loading...</p>

		<div id="stats-content" hidden>
			Status: <span id="stat-online"></span><br />
			Party: <span id="stat-party"></span><br />

				<h3>Match</h3>
				Gamemode: <span id="stat-gamemode"></span><br />
				Map: <span id="stat-map"></span><br />
				Players: <span id="stat-players"></span><br />
				<ul id="stat-matchplayers"></ul>
			</div>
		</div>

		<script type="module" src="/src/common.ts"></script>
		<script type="module" src="/src/blockfront_stats/status.ts"></script>
	</body>
</html>
